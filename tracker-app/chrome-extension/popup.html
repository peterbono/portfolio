<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=300">
  <title>JobTracker - LinkedIn Connect</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <div class="header">
      <div class="bot-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8V4H8"/>
          <rect width="16" height="12" x="4" y="8" rx="2"/>
          <path d="M2 14h2"/>
          <path d="M20 14h2"/>
          <path d="M15 13v2"/>
          <path d="M9 13v2"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>JobTracker</h1>
        <span class="subtitle">LinkedIn Connect</span>
      </div>
    </div>

    <!-- Not Connected State -->
    <div id="state-disconnected" class="state">
      <div class="status-badge disconnected">
        <span class="dot"></span>
        Not connected
      </div>
      <p class="description">
        One click to connect. We only read your session to search and apply for jobs on your behalf.
      </p>
      <button id="btn-connect" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
          <rect width="4" height="12" x="2" y="9"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        Connect LinkedIn
      </button>
    </div>

    <!-- Connecting State -->
    <div id="state-connecting" class="state hidden">
      <div class="spinner-container">
        <div class="spinner"></div>
        <p class="connecting-text">Connecting to LinkedIn...</p>
      </div>
    </div>

    <!-- Connected State -->
    <div id="state-connected" class="state hidden">
      <div class="status-badge connected">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Connected
      </div>
      <div class="connected-info">
        <p class="user-name" id="linkedin-name">LinkedIn User</p>
        <p class="last-sync" id="last-sync">Last synced: just now</p>
      </div>
      <button id="btn-disconnect" class="btn btn-secondary">
        Disconnect
      </button>
    </div>

    <!-- Error State -->
    <div id="state-error" class="state hidden">
      <div class="status-badge error">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        Connection failed
      </div>
      <p class="error-message" id="error-message">An error occurred.</p>
      <button id="btn-retry" class="btn btn-primary">
        Retry
      </button>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="https://tracker-app-lyart.vercel.app" target="_blank" rel="noopener">
        Open JobTracker Dashboard
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
