name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tracker-app/package-lock.json

      - name: Install dependencies
        working-directory: tracker-app
        run: npm ci

      - name: TypeScript type check
        working-directory: tracker-app
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: tracker-app
        run: npx vitest run

      - name: Production build
        working-directory: tracker-app
        run: npm run build
